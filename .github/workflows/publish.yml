name: Publish Package

on:
  release:
    types: [ created ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install scanner jar
        run: ./gradlew :gradle-generator:installScannerJar
      - name: Build
        run: pnpm --filter rtm-ts run build
      - name: Publish
        run: pnpm --filter rtm-ts publish --no-git-checks --provenance --access public